[supervisord]
nodaemon=true
logfile=/app/logs/supervisord.log
logfile_maxbytes=50MB
logfile_backups=10
loglevel=info
pidfile=/tmp/supervisord.pid
user=root

[program:gunicorn]
command=uv run --frozen gunicorn app:app -c gunicorn.conf.py
directory=/app
autostart=true
autorestart=true
stdout_logfile=/dev/fd/1
stdout_logfile_maxbytes=0
stderr_logfile=/dev/fd/2
stderr_logfile_maxbytes=0
stopasgroup=true
killasgroup=true
stopsignal=TERM

[program:cron]
command=cron -f
autostart=true
autorestart=true
stdout_logfile=/app/logs/cron.log
stderr_logfile=/app/logs/cron_error.log
