[supervisord]
nodaemon=true
user=root
logfile=/app/logs/supervisord.log
logfile_maxbytes=50MB
logfile_backups=10
loglevel=info
pidfile=/tmp/supervisord.pid

[program:gunicorn]
command=uv run --frozen gunicorn app:app -c gunicorn.conf.py
directory=/app
autostart=true
autorestart=true
stdout_logfile=/app/logs/gunicorn_access.log
stdout_logfile_maxbytes=10MB
stdout_logfile_backups=3
stderr_logfile=/app/logs/gunicorn_error.log
stderr_logfile_maxbytes=10MB
stderr_logfile_backups=3
stopsignal=TERM

[program:cron]
command=cron -f
autostart=true
autorestart=true
stdout_logfile=/app/logs/cron.log
stderr_logfile=/app/logs/cron_error.log
