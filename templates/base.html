<!DOCTYPE html>
<html lang="{{ language|default('de') }}">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{ texts.app_title|default("Das Caner - Mensa LUH") }}</title>
    <link
      rel="icon"
      href="{{ url_for('static', filename='img/caner.png') }}"
      type="image/png"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/vanillajs-datepicker@1.3.4/dist/css/datepicker-bs5.min.css"
    />
    <script
      src="https://cdn.jsdelivr.net/npm/vanillajs-datepicker@1.3.4/dist/js/datepicker-full.min.js"
      defer
    ></script>
    <script
      src="https://cdn.jsdelivr.net/npm/vanillajs-datepicker@1.3.4/dist/js/locales/de.js"
      defer
    ></script>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/style.css') }}"
    />
    <script>
      (function () {
        const savedPreference = localStorage.getItem("themePreference");
        const legacyDarkMode = localStorage.getItem("darkMode");
        const preference = savedPreference || (
          legacyDarkMode === "enabled" ? "dark" :
          legacyDarkMode === "disabled" ? "light" :
          "system"
        );
        const systemDark = window.matchMedia &&
          window.matchMedia("(prefers-color-scheme: dark)").matches;
        if (preference === "dark" || (preference === "system" && systemDark)) {
          document.documentElement.setAttribute("data-theme", "dark");
        }
      })();
    </script>
  </head>
  <body>
    <header class="header-area">
      <div class="container">
        <nav class="header-controls" aria-label="Display settings">
          <div
            class="language-switch"
            role="radiogroup"
            aria-label="Language"
            data-current-lang="{{ language }}"
          >
            <button
              type="button"
              class="language-option{% if language == 'de' %} active{% endif %}"
              data-lang="de"
              role="radio"
              aria-checked="{{ 'true' if language == 'de' else 'false' }}"
              aria-label="Deutsch"
              title="Deutsch"
            >
              <span aria-hidden="true">🇩🇪</span>
            </button>
            <button
              type="button"
              class="language-option{% if language == 'en' %} active{% endif %}"
              data-lang="en"
              role="radio"
              aria-checked="{{ 'true' if language == 'en' else 'false' }}"
              aria-label="English"
              title="English"
            >
              <span aria-hidden="true">🇬🇧</span>
            </button>
          </div>
          <button
            id="darkModeToggle"
            class="btn btn-sm header-icon-button"
            type="button"
            title="Toggle light and dark mode"
            aria-label="Toggle light and dark mode"
          >
            <i class="fas fa-moon" aria-hidden="true"></i>
          </button>
          <button
            id="expertModeToggleIcon"
            class="btn btn-sm header-icon-button"
            type="button"
            title="{{ texts.expert_mode }}"
            aria-label="{{ texts.expert_mode }}"
            aria-pressed="{{ 'true' if expert_mode else 'false' }}"
          >
            <i class="fas fa-dumbbell" aria-hidden="true"></i>
          </button>
        </nav>
        <div class="row py-2 align-items-center">
          <div
            class="col-md-2 col-3 d-flex align-items-center justify-content-center"
          >
            <a href="{{ url_for('index') }}" class="text-decoration-none">
              <div class="caner-image mirrored">
                <img
                  src="{{ url_for('static', filename='img/caner.png') }}"
                  alt="Caner"
                  class="img-fluid light-caner"
                />
                <img
                  src="{{ url_for('static', filename='img/darkcaner.png') }}"
                  alt="Caner dark mode"
                  class="img-fluid dark-caner"
                />
              </div>
            </a>
          </div>
          <div class="col-md-8 col-6">
            <div class="text-container">
              <h1 class="text-center">
                <a href="{{ url_for('index') }}" class="text-decoration-none text-reset"
                  >Das Caner</a
                >
              </h1>
              <p class="header-description text-center d-none d-md-block">
                {{ texts.header_description_desktop }}
              </p>
              <p class="header-description text-center d-block d-md-none">
                {{ texts.header_description_mobile }}
              </p>
            </div>
          </div>
          <div
            class="col-md-2 col-3 d-flex align-items-center justify-content-center"
          >
            <a href="{{ url_for('index') }}" class="text-decoration-none">
              <div class="caner-image">
                <img
                  src="{{ url_for('static', filename='img/caner.png') }}"
                  alt="Caner"
                  class="img-fluid light-caner"
                />
                <img
                  src="{{ url_for('static', filename='img/darkcaner.png') }}"
                  alt="Caner dark mode"
                  class="img-fluid dark-caner"
                />
              </div>
            </a>
          </div>
        </div>
      </div>
    </header>

    <main class="content-area">
      <div class="container">{% block content %}{% endblock content %}</div>
    </main>

    <footer class="page-counter-footer">
      <div class="container text-center">
        <div class="d-flex justify-content-center align-items-center gap-3">
          <div class="page-view-counter">
            <p class="mb-0">
              <span class="counter-icon"><i class="fas fa-eye"></i></span>
              <span class="counter-text">{{ page_views }} Cnr</span>
            </p>
          </div>
          <a
            href="https://github.com/match-Misc/caner"
            target="_blank"
            rel="noopener noreferrer"
            class="github-link"
            title="{{ texts.github_title }}"
          >
            <i class="fab fa-github fa-lg"></i>
          </a>
        </div>
      </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
  </body>
</html>
