services:
  postgres:
    image: postgres:16-alpine
    container_name: caner-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-caner}
      POSTGRES_USER: ${POSTGRES_USER:-caner}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-caner_dev_password}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  caner:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: caner
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "30823:30823"
    env_file:
      - .env
    environment:
      PORT: 30823
      DATABASE_URL: postgresql://${POSTGRES_USER:-caner}:${POSTGRES_PASSWORD:-caner_dev_password}@postgres:5432/${POSTGRES_DB:-caner}
    volumes:
      - ./logs:/app/logs
      - ./data/meal_images:/app/data/meal_images
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:30823/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
